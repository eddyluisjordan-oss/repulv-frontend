<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — RepuLV</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #c8a84b; --gold-light: #f5d98e; --bg: #08080f; --border: rgba(255,255,255,0.07); --text: #e8e6f0; --muted: #555; --green: #22c55e; --red: #ef4444; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 50% 0%, rgba(200,168,75,0.08) 0%, transparent 70%); }
.card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.logo-box { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; color: #0a0a0f; }
.logo-text { font-size: 22px; font-weight: 900; }
.logo-text span { color: var(--gold); }
h1 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
.sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.form-label { display: block; font-size: 11px; font-weight: 700; color: #666; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
.form-input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; margin-bottom: 16px; }
.form-input:focus { border-color: var(--gold); }
.pw-wrap { position: relative; }
.pw-wrap .form-input { padding-right: 44px; margin-bottom: 16px; }
.eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #555; font-size: 16px; padding: 4px; }
.btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #0a0a0f; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--green); margin-bottom: 16px; display: none; }
.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 16px; display: none; }
.back { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
.back a { color: var(--gold); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-box">R</div>
    <div class="logo-text">Repu<span>LV</span></div>
  </div>
  <h1>Set New Password</h1>
  <p class="sub">Enter your new password below.</p>
  <div class="error" id="err"></div>
  <div class="success" id="success">Password reset! <a href="dashboard.html" style="color:var(--green);">Click here to login</a></div>
  <div id="form">
    <label class="form-label">New Password</label>
    <div class="pw-wrap">
      <input type="password" class="form-input" id="pw" placeholder="At least 8 characters">
      <button type="button" class="eye-btn" onclick="togglePw()">👁</button>
    </div>
    <label class="form-label">Confirm Password</label>
    <input type="password" class="form-input" id="pw2" placeholder="Repeat password">
    <button class="btn" onclick="doReset()" id="btn">Reset Password</button>
  </div>
  <div class="back"><a href="dashboard.html">Back to login</a></div>
</div>
<script>
const API = 'https://repulv-backend-production.up.railway.app';
const token = new URLSearchParams(window.location.search).get('token');
if (!token) { document.getElementById('err').textContent = 'Invalid reset link.'; document.getElementById('err').style.display = 'block'; document.getElementById('form').style.display = 'none'; }

function togglePw() {
  const input = document.getElementById('pw');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function doReset() {
  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  if (pw.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; return; }
  if (pw !== pw2) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    const res = await fetch(`${API}/auth/reset-password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('form').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } else {
      err.textContent = data.error || 'Reset failed. Try again.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Reset Password';
    }
  } catch(e) {
    err.textContent = 'Network error. Try again.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
